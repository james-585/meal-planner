<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#faf8f4">
<title>Meal Planner</title>
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Fraunces:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf8f4;--fg:#1a1714;--card:#fff;--accent:#c45d3e;--al:#f4e8e3;--ad:#9e3e24;--border:#e8e4de;--muted:#8a8279;--green:#4a7c59;--tag:#f0ece6;--r:12px;--f:'DM Sans',system-ui,sans-serif;--fd:'Fraunces',Georgia,serif;--ww:#125a2d}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--fg);font-family:var(--f);-webkit-font-smoothing:antialiased}
.app{max-width:540px;margin:0 auto;min-height:100vh;padding-bottom:80px}
.hd{padding:20px 20px 12px;display:flex;align-items:center;justify-content:space-between}
.hd h1{font-family:var(--fd);font-size:26px;font-weight:600}
.hda{display:flex;gap:8px}
.ib{width:38px;height:38px;border-radius:50%;border:1px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--fg);font-size:18px;font-family:inherit}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:8px;border:none;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}.btn:disabled{opacity:.5;cursor:not-allowed}
.bp{background:var(--accent);color:#fff}.bs{background:var(--tag);color:var(--fg)}.bo{background:none;border:1px solid var(--border);color:var(--fg)}.bg{background:var(--green);color:#fff}.bd{background:#fde8e8;color:#c53030}
.bw{background:var(--ww);color:#fff;font-size:16px;font-weight:600;padding:16px;border-radius:var(--r);width:100%;box-shadow:0 2px 8px rgba(18,90,45,.25)}.bw:disabled{opacity:.6}
.tabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:540px;display:flex;background:var(--card);border-top:1px solid var(--border);z-index:100;padding:6px 0 env(safe-area-inset-bottom,8px)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;border:none;background:none;cursor:pointer;color:var(--muted);font-size:11px;font-weight:500;position:relative;font-family:inherit}.tab.on{color:var(--accent)}.tab svg{width:22px;height:22px}
.badge{position:absolute;top:2px;right:calc(50% - 20px);min-width:18px;height:18px;border-radius:9px;background:var(--accent);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin:0 16px 12px}
.ct{font-family:var(--fd);font-size:18px;font-weight:600;margin-bottom:4px;cursor:pointer}
.cm{font-size:13px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;background:var(--tag);color:var(--fg);border:none;cursor:pointer;font-family:inherit}.chip:hover{background:var(--al);color:var(--accent)}
.ca{background:var(--accent);color:#fff}.ca:hover{background:var(--ad)}
.fg{margin-bottom:14px}.fl{display:block;font-size:13px;font-weight:500;margin-bottom:4px;color:var(--muted)}
.fi{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg);color:var(--fg);font-family:inherit}.fi:focus{outline:none;border-color:var(--accent)}
.fr{display:flex;gap:10px}.fr>*{flex:1}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.mb{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;padding:24px 20px 32px}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}.mh h2{font-family:var(--fd);font-size:22px;font-weight:600}
.xb{width:32px;height:32px;border-radius:50%;border:none;background:var(--tag);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--muted)}
.si{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}.si:last-child{border-bottom:none}
.sc{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:transparent;font-size:12px}.sc.ck{background:var(--green);border-color:var(--green);color:#fff}
.ch{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--accent);padding:16px 0 6px;display:flex;align-items:center;gap:8px}.ch::after{content:"";flex:1;height:1px;background:var(--border)}
.pc{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:12px;display:flex;gap:12px;cursor:pointer;margin-bottom:8px}.pc:hover,.pc.sel{border-color:var(--ww)}.pc.sel{background:#f0faf3}
.pi{width:64px;height:64px;border-radius:8px;object-fit:contain;background:#f5f5f5;flex-shrink:0}
.pn{font-size:13px;font-weight:500;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pp{font-size:16px;font-weight:700;color:var(--ww)}
.dc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin:0 16px 10px}
.dl{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:8px}
.dr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bg);border-radius:8px;font-size:14px;margin-bottom:4px}
.dr button{border:none;background:none;cursor:pointer;color:var(--muted);font-size:16px}
.empty{text-align:center;padding:48px 24px;color:var(--muted)}.empty p{font-size:15px;margin-bottom:16px}
.spin{width:20px;height:20px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;display:inline-block}
.spd{border-color:rgba(0,0,0,.1);border-top-color:var(--ww)}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--fg);color:var(--bg);padding:10px 20px;border-radius:24px;font-size:14px;font-weight:500;z-index:300;box-shadow:0 4px 16px rgba(0,0,0,.2);white-space:nowrap}
.ir{display:flex;gap:6px;align-items:center;margin-bottom:8px}.ir input{font-size:13px;padding:8px}
.ia{width:60px;flex-shrink:0}.iu{width:70px;flex-shrink:0}.in{flex:1}
.ix{width:28px;height:28px;border-radius:50%;border:none;background:#fde8e8;color:#c53030;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.srow{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px}
.snum{width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:8px}
.srow textarea{flex:1;min-height:60px;resize:vertical}
.wov{position:fixed;inset:0;background:var(--bg);z-index:250;overflow-y:auto}.wfl{max-width:540px;margin:0 auto;padding:24px 20px 40px}
.wsu{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:16px}
.lnk{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;text-decoration:none;color:var(--fg);font-size:13px}.lnk:hover{border-color:var(--ww)}
.lnk span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ddw{position:relative;display:inline-block}
.ddm{position:absolute;bottom:calc(100% + 4px);left:0;background:var(--card);border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.1);min-width:150px;overflow:hidden;z-index:50}
.ddm button{display:block;width:100%;text-align:left;padding:8px 14px;border:none;background:none;cursor:pointer;font-size:13px;font-family:inherit}.ddm button:hover{background:var(--al)}
/* Review box */
.rvw{background:#fffbe6;border:2px solid #f0c040;border-radius:var(--r);padding:16px;margin-bottom:16px}
.rvw h3{font-size:15px;font-weight:600;margin-bottom:8px;color:#7a5a00}
.warn{background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#7a5a00}
</style>
</head>
<body>
<div class="app" id="app"><div style="display:flex;align-items:center;justify-content:center;height:100vh"><div style="font-size:18px;opacity:.6">Loading...</div></div></div>
<script>
const S={recipes:JSON.parse(localStorage.getItem('mp_r')||'[]'),plan:JSON.parse(localStorage.getItem('mp_p')||'{}'),list:JSON.parse(localStorage.getItem('mp_l')||'[]'),tab:'recipes',toast:'',wwAuth:null};
const CATS={"Fruit & Veg":["onion","garlic","tomato","potato","carrot","lettuce","spinach","broccoli","capsicum","zucchini","mushroom","avocado","lemon","lime","ginger","chilli","coriander","parsley","basil","mint","thyme","rosemary","banana","apple","orange","berries","cucumber","celery","sweet potato","corn","peas","beans","kale","rocket","spring onion","shallot","leek","beetroot","pumpkin","eggplant","cabbage","cauliflower","asparagus"],"Meat & Seafood":["chicken","beef","pork","lamb","mince","sausage","bacon","ham","steak","salmon","prawns","fish","tuna","turkey","chorizo"],"Dairy & Eggs":["milk","cheese","butter","cream","yoghurt","egg","parmesan","mozzarella","cheddar","feta","ricotta","sour cream","cream cheese"],"Bakery":["bread","rolls","tortilla","pita","naan","wraps","pastry","sourdough"],"Pantry":["flour","sugar","salt","pepper","oil","olive oil","vinegar","soy sauce","fish sauce","oyster sauce","tomato paste","coconut milk","stock","rice","pasta","noodles","lentils","chickpeas","canned tomatoes","honey","maple syrup","mustard","cumin","paprika","turmeric","cinnamon","oregano","curry powder","chilli flakes","baking powder","vanilla","cocoa","cornflour","breadcrumbs","sesame oil","tahini","peanut butter"],"Frozen":["frozen peas","frozen berries","ice cream"],"Drinks":["water","juice","coffee","tea","wine","beer","almond milk","oat milk","soy milk"],"Other":[]};
const DAYS=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
function cat(n){const l=n.toLowerCase();for(const[c,ks]of Object.entries(CATS)){if(c==="Other")continue;for(const k of ks)if(l.includes(k))return c;}return"Other";}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8);}
function save(){localStorage.setItem('mp_r',JSON.stringify(S.recipes));localStorage.setItem('mp_p',JSON.stringify(S.plan));localStorage.setItem('mp_l',JSON.stringify(S.list));}
function toast(m){S.toast=m;R();setTimeout(()=>{S.toast='';R();},2400);}
function h(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function $(s,c){return(c||document).querySelector(s);}
function $$(s,c){return(c||document).querySelectorAll(s);}
function toSearch(n){let s=n.toLowerCase().trim().replace(/\(.*?\)/g,'');s=s.replace(/\b(finely|roughly|freshly|thinly|diced|chopped|sliced|minced|grated|crushed|ground|peeled|deseeded|trimmed|halved|quartered|torn|shredded|juiced|zested|melted|softened|room temperature|to taste|optional|for serving|for garnish|extra|good quality|large|medium|small|baby)\b/gi,'');return s.replace(/,/g,' ').replace(/\s+/g,' ').trim();}

fetch('/api/woolworths/auth-status').then(r=>r.json()).then(d=>{S.wwAuth=d;}).catch(()=>{S.wwAuth={loggedIn:false};}).finally(R);

// ═══ RENDER ═══
function R(){
  const app=$('#app');let o='';
  if(S.tab==='recipes')o=rRecipes();else if(S.tab==='planner')o=rPlanner();else if(S.tab==='shopping')o=rShopping();
  const uc=S.list.filter(i=>!i.checked).length;
  o+=`<div class="tabs"><button class="tab ${S.tab==='recipes'?'on':''}" data-t="recipes"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>Recipes</button><button class="tab ${S.tab==='planner'?'on':''}" data-t="planner"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Planner</button><button class="tab ${S.tab==='shopping'?'on':''}" data-t="shopping"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>Shopping${uc?`<span class="badge">${uc}</span>`:''}</button></div>`;
  if(S.toast)o+=`<div class="toast">${h(S.toast)}</div>`;
  app.innerHTML=o;
  $$('.tab',app).forEach(b=>b.onclick=()=>{S.tab=b.dataset.t;R();});
  $$('[data-a]',app).forEach(el=>{el.onclick=e=>{e.stopPropagation();const a=el.dataset.a,id=el.dataset.id,day=el.dataset.day,idx=el.dataset.idx;
    if(a==='add')showRecipeForm();else if(a==='imp')showImportModal();else if(a==='view')showDetail(S.recipes.find(r=>r.id===id));
    else if(a==='plan')showDayPicker(el,id);else if(a==='pick')showPicker(day);
    else if(a==='rmeal'){S.plan[day].splice(+idx,1);save();R();}else if(a==='clrp'){S.plan={};save();R();}
    else if(a==='gen')genList();else if(a==='tog'){S.list[+idx].checked=!S.list[+idx].checked;save();R();}
    else if(a==='clrc'){S.list=S.list.filter(i=>!i.checked);save();R();toast('Cleared');}
    else if(a==='gop'){S.tab='planner';R();}else if(a==='ww')startWW();
  };});
}

function rRecipes(){
  let o=`<div class="hd"><h1>Recipes</h1><div class="hda"><button class="ib" data-a="imp">🔗</button><button class="ib" data-a="add">+</button></div></div>`;
  if(!S.recipes.length)return o+`<div class="empty"><div style="font-size:48px;opacity:.3;margin-bottom:8px">📖</div><p>No recipes yet</p><div style="display:flex;gap:8px;justify-content:center"><button class="btn bp" data-a="add">Add Manually</button><button class="btn bo" data-a="imp">Import URL</button></div></div>`;
  S.recipes.forEach(r=>{o+=`<div class="card"><div class="ct" data-a="view" data-id="${r.id}">${h(r.name)}</div>${r.description?`<p style="font-size:13px;color:var(--muted);margin-bottom:6px">${h(r.description)}</p>`:''}<div class="cm">${r.servings?`<span>🍽 ${h(r.servings)}</span>`:''}${r.prepTime?`<span>⏱ ${h(r.prepTime)}</span>`:''}${r.cookTime?`<span>🔥 ${h(r.cookTime)}</span>`:''}<span>📝 ${r.ingredients.length} ing.</span></div><div style="display:flex;gap:8px;margin-top:12px"><button class="chip" data-a="view" data-id="${r.id}">View</button><div class="ddw"><button class="chip ca" data-a="plan" data-id="${r.id}">+ Plan</button></div></div></div>`;});
  return o;
}

function rPlanner(){
  const tot=Object.values(S.plan).flat().length;
  let o=`<div class="hd"><h1>Week Planner</h1><button class="btn bp" data-a="gen" ${tot?'':'disabled'}>Generate List</button></div>`;
  if(tot)o+=`<div style="padding:0 16px 10px;display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;color:var(--muted)">${tot} meal${tot>1?'s':''}</span><button class="chip" data-a="clrp">Clear all</button></div>`;
  DAYS.forEach(d=>{const rs=(S.plan[d]||[]).map(id=>S.recipes.find(r=>r.id===id)).filter(Boolean);o+=`<div class="dc"><div class="dl">${d}</div>${rs.map((r,i)=>`<div class="dr"><span>${h(r.name)}</span><button data-a="rmeal" data-day="${d}" data-idx="${i}">✕</button></div>`).join('')}<button class="chip" style="margin-top:4px" data-a="pick" data-day="${d}">+ Add meal</button></div>`;});
  return o;
}

function rShopping(){
  let o=`<div class="hd"><h1>Shopping</h1><div class="hda">${S.list.length?`<button class="ib" data-a="clrc">🗑</button>`:''}</div></div>`;
  if(!S.list.length)return o+`<div class="empty"><div style="font-size:48px;opacity:.3;margin-bottom:8px">🛒</div><p>No shopping list yet</p><button class="btn bp" data-a="gop">Go to Planner</button></div>`;
  const dn=S.list.filter(i=>i.checked).length,tt=S.list.length;
  o+=`<div style="padding:0 16px"><div style="margin-bottom:16px"><div style="display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:6px"><span>${dn} of ${tt}</span><span>${Math.round(dn/tt*100)}%</span></div><div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden"><div style="height:100%;width:${dn/tt*100}%;background:var(--green);border-radius:3px"></div></div></div>`;
  o+=`<button class="bw" data-a="ww" ${dn===tt?'disabled':''}>🛒 Send to Woolworths</button>`;
  o+=`<p style="font-size:12px;color:var(--muted);text-align:center;margin:8px 0 16px;line-height:1.5">${S.wwAuth?.loggedIn?'Logged in as '+h(S.wwAuth.email)+'.':'Search products, then add to cart or open product pages.'}</p>`;
  const gr={};S.list.forEach((it,i)=>{if(!gr[it.category])gr[it.category]=[];gr[it.category].push({...it,_i:i});});
  Object.keys(CATS).forEach(c=>{if(!gr[c]?.length)return;o+=`<div class="ch">${c}</div>`;gr[c].forEach(it=>{o+=`<div class="si"><div class="sc ${it.checked?'ck':''}" data-a="tog" data-idx="${it._i}">${it.checked?'✓':''}</div><span style="flex:1;font-size:14px;${it.checked?'text-decoration:line-through;color:var(--muted)':''}">${h(it.name)}</span>${it.amount?`<span style="font-size:13px;color:var(--muted)">${h(it.amount)}${it.unit?' '+h(it.unit):''}</span>`:''}</div>`;});});
  o+='</div>';return o;
}

function genList(){
  const all={};const ids=new Set();Object.values(S.plan).flat().forEach(id=>ids.add(id));
  for(const rid of ids){const r=S.recipes.find(x=>x.id===rid);if(!r)continue;let c=0;Object.values(S.plan).flat().forEach(id=>{if(id===rid)c++;});
    for(const ing of r.ingredients){const k=ing.name.toLowerCase().trim();if(!all[k])all[k]={name:ing.name,amount:ing.amount||'',unit:ing.unit||'',category:cat(ing.name),checked:false};
      else{const ex=all[k];if(ex.unit===ing.unit&&!isNaN(parseFloat(ex.amount))&&!isNaN(parseFloat(ing.amount)))ex.amount=String(parseFloat(ex.amount)+parseFloat(ing.amount)*c);else if(ing.amount)ex.amount=ex.amount?`${ex.amount} + ${ing.amount}${ing.unit?' '+ing.unit:''}`:ing.amount;}}}
  S.list=Object.values(all).sort((a,b)=>a.category.localeCompare(b.category));save();S.tab='shopping';R();toast(`${S.list.length} items`);
}

// ═══ MODALS ═══
function modal(title,html,fn){
  const ov=document.createElement('div');ov.className='mo';
  ov.innerHTML=`<div class="mb"><div class="mh"><h2>${title}</h2><button class="xb" id="_x">✕</button></div><div id="_c">${html}</div></div>`;
  document.body.appendChild(ov);const cl=()=>ov.remove();$('#_x',ov).onclick=cl;ov.onclick=e=>{if(e.target===ov)cl();};if(fn)fn($('#_c',ov),cl);return{ov,cl};
}

// ═══ IMPORT with REVIEW ═══
function showImportModal(){
  modal('Import Recipe',`<div class="fg"><label class="fl">Recipe URL</label><input class="fi" id="iu" placeholder="https://www.taste.com.au/recipes/..."></div><p style="font-size:13px;color:var(--muted);margin-bottom:16px">Works with taste.com.au, BBC Good Food, AllRecipes and most recipe sites.</p><div id="ie" style="font-size:13px;color:#c53030;margin-bottom:12px;display:none"></div><div id="rv"></div><button class="btn bp" style="width:100%" id="ig">Import Recipe</button>`,(mc,cl)=>{
    const ui=$('#iu',mc),er=$('#ie',mc),rv=$('#rv',mc),btn=$('#ig',mc);
    let pendingRecipe=null;
    ui.addEventListener('keydown',e=>{if(e.key==='Enter')doImport();});
    btn.onclick=()=>{if(pendingRecipe)saveImported();else doImport();};

    async function doImport(){
      const url=ui.value.trim();if(!url)return;
      btn.disabled=true;btn.innerHTML='<span class="spin"></span> Importing...';er.style.display='none';rv.innerHTML='';pendingRecipe=null;
      try{
        const resp=await fetch('/api/import-recipe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url})});
        const data=await resp.json();
        if(data.success&&data.recipe){
          pendingRecipe=data.recipe;
          // ── SHOW REVIEW ──
          rv.innerHTML=`<div class="rvw"><h3>📋 Review before saving</h3>
            <p style="font-size:14px;font-weight:600;margin-bottom:8px">${h(pendingRecipe.name)}</p>
            ${pendingRecipe.description?`<p style="font-size:13px;color:var(--muted);margin-bottom:8px">${h(pendingRecipe.description)}</p>`:''}
            <div style="font-size:13px;color:var(--muted);margin-bottom:8px">${pendingRecipe.servings?'🍽 '+h(pendingRecipe.servings)+' · ':''}${pendingRecipe.prepTime?'⏱ '+h(pendingRecipe.prepTime)+' · ':''}${pendingRecipe.cookTime?'🔥 '+h(pendingRecipe.cookTime):''}</div>
            ${pendingRecipe._warning?`<div class="warn">⚠ ${h(pendingRecipe._warning)}</div>`:''}
            <div style="font-size:12px;font-weight:600;text-transform:uppercase;color:var(--muted);margin-bottom:4px">Ingredients (${pendingRecipe.ingredients.length})</div>
            ${pendingRecipe.ingredients.map(i=>`<div style="font-size:13px;padding:3px 0">${i.amount?'<b>'+h(i.amount)+(i.unit?' '+h(i.unit):'')+'</b> ':''}<span>${h(i.name)}</span></div>`).join('')}
            ${pendingRecipe.steps.length?`<div style="font-size:12px;font-weight:600;text-transform:uppercase;color:var(--muted);margin:8px 0 4px">Steps (${pendingRecipe.steps.length})</div>${pendingRecipe.steps.map((s,i)=>`<div style="font-size:13px;padding:3px 0"><b>${i+1}.</b> ${h(s.substring(0,120))}${s.length>120?'...':''}</div>`).join('')}`:''}
          </div>`;
          btn.disabled=false;btn.textContent='✓ Looks good — Save recipe';
          btn.className='btn bg';btn.style.width='100%';
        }else{
          er.textContent=data.error||'Could not extract recipe.';er.style.display='block';
          btn.disabled=false;btn.textContent='Import Recipe';
          if(data.partialData){
            er.innerHTML+=`<br><button class="btn bo" style="margin-top:8px;font-size:12px" id="mf">Add manually as "${h(data.partialData.name)}"</button>`;
            $('#mf',mc).onclick=()=>{cl();showRecipeForm({name:data.partialData.name,sourceUrl:url});};
          }
        }
      }catch(e){er.textContent='Network error.';er.style.display='block';btn.disabled=false;btn.textContent='Import Recipe';}
    }

    function saveImported(){
      if(!pendingRecipe)return;
      pendingRecipe.id=uid();
      pendingRecipe.ingredients=pendingRecipe.ingredients.map(i=>({...i,id:uid()}));
      S.recipes.push(pendingRecipe);save();cl();R();toast('Recipe imported!');
    }
  });
}

// ═══ RECIPE FORM ═══
function showRecipeForm(existing){
  const r=existing||{name:'',description:'',servings:'4',prepTime:'',cookTime:'',ingredients:[{id:uid(),amount:'',unit:'',name:''}],steps:[''],sourceUrl:''};
  if(!r.ingredients?.length)r.ingredients=[{id:uid(),amount:'',unit:'',name:''}];if(!r.steps?.length)r.steps=[''];
  let ings=[...r.ingredients],steps=[...r.steps];
  modal(existing?.id?'Edit Recipe':'Add Recipe','<div id="rf"></div>',(mc,cl)=>{
    function rf(){
      const el=$('#rf',mc);
      el.innerHTML=`<div class="fg"><label class="fl">Name *</label><input class="fi" id="fn" value="${h(r.name)}"></div><div class="fg"><label class="fl">Description</label><input class="fi" id="fd" value="${h(r.description||'')}"></div><div class="fr"><div class="fg"><label class="fl">Servings</label><input class="fi" id="fs" value="${h(r.servings||'4')}"></div><div class="fg"><label class="fl">Prep</label><input class="fi" id="fp" value="${h(r.prepTime||'')}"></div><div class="fg"><label class="fl">Cook</label><input class="fi" id="fc" value="${h(r.cookTime||'')}"></div></div><div style="display:flex;justify-content:space-between;margin:16px 0 10px"><label class="fl" style="margin:0">Ingredients</label><button class="chip" id="ai">+ Add</button></div><div id="il"></div><div style="display:flex;justify-content:space-between;margin:16px 0 10px"><label class="fl" style="margin:0">Method</label><button class="chip" id="as">+ Step</button></div><div id="sl"></div><div style="display:flex;gap:10px;margin-top:20px"><button class="btn bp" style="flex:1" id="sv">${existing?.id?'Save':'Add Recipe'}</button><button class="btn bs" id="cn">Cancel</button></div>`;
      const il=$('#il',el);ings.forEach((ing,i)=>{const row=document.createElement('div');row.className='ir';row.innerHTML=`<input class="fi ia" placeholder="Qty" value="${h(ing.amount)}" data-i="${i}" data-f="amount"><input class="fi iu" placeholder="Unit" value="${h(ing.unit)}" data-i="${i}" data-f="unit"><input class="fi in" placeholder="Ingredient" value="${h(ing.name)}" data-i="${i}" data-f="name">${ings.length>1?`<button class="ix" data-ri="${i}">✕</button>`:''}`;$$('input',row).forEach(inp=>{inp.oninput=()=>{ings[+inp.dataset.i][inp.dataset.f]=inp.value;};});const rm=$('.ix',row);if(rm)rm.onclick=()=>{ings.splice(i,1);rf();};il.appendChild(row);});
      const sl=$('#sl',el);steps.forEach((s,i)=>{const row=document.createElement('div');row.className='srow';row.innerHTML=`<div class="snum">${i+1}</div><textarea class="fi" data-si="${i}">${h(s)}</textarea>${steps.length>1?`<button class="ix" style="margin-top:8px" data-rs="${i}">✕</button>`:''}`;$('textarea',row).oninput=e=>{steps[+e.target.dataset.si]=e.target.value;};const rm=$('.ix',row);if(rm)rm.onclick=()=>{steps.splice(i,1);rf();};sl.appendChild(row);});
      $('#ai',el).onclick=()=>{ings.push({id:uid(),amount:'',unit:'',name:''});rf();};
      $('#as',el).onclick=()=>{steps.push('');rf();};$('#cn',el).onclick=cl;
      $('#sv',el).onclick=()=>{const name=$('#fn',el).value.trim();if(!name)return;const rec={id:existing?.id||uid(),name,description:$('#fd',el).value.trim(),servings:$('#fs',el).value,prepTime:$('#fp',el).value,cookTime:$('#fc',el).value,ingredients:ings.filter(i=>i.name.trim()),steps:steps.filter(s=>s.trim()),sourceUrl:r.sourceUrl||''};if(existing?.id){const idx=S.recipes.findIndex(x=>x.id===existing.id);if(idx!==-1)S.recipes[idx]=rec;}else S.recipes.push(rec);save();cl();R();toast(existing?.id?'Updated!':'Added!');};
    }rf();
  });
}

function showDetail(r){if(!r)return;modal(r.name,`${r.description?`<p style="font-size:14px;color:var(--muted);margin-bottom:12px">${h(r.description)}</p>`:''}<div class="cm" style="margin-bottom:16px">${r.servings?`<span>🍽 ${h(r.servings)}</span>`:''}${r.prepTime?`<span>⏱ ${h(r.prepTime)}</span>`:''}${r.cookTime?`<span>🔥 ${h(r.cookTime)}</span>`:''}</div>${r.sourceUrl?`<p style="font-size:12px;color:var(--muted);margin-bottom:12px">Source: <a href="${h(r.sourceUrl)}" target="_blank" style="color:var(--accent)">${h(new URL(r.sourceUrl).hostname)}</a></p>`:''}<div class="ch">Ingredients</div>${r.ingredients.map(i=>`<div style="padding:6px 0;font-size:14px;display:flex;gap:6px">${(i.amount||i.unit)?`<b style="color:var(--accent)">${h(i.amount)}${i.unit?' '+h(i.unit):''}</b>`:''}<span>${h(i.name)}</span></div>`).join('')}${r.steps?.length?`<div class="ch" style="margin-top:8px">Method</div>${r.steps.map((s,i)=>`<div style="display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)"><div class="snum">${i+1}</div><p style="font-size:14px;line-height:1.6">${h(s)}</p></div>`).join('')}`:''}<div style="display:flex;gap:10px;margin-top:20px"><button class="btn bo" style="flex:1" id="ed">Edit</button><button class="btn bd" id="dl">Delete</button></div>`,(mc,cl)=>{$('#ed',mc).onclick=()=>{cl();showRecipeForm(r);};$('#dl',mc).onclick=()=>{if(!confirm('Delete?'))return;S.recipes=S.recipes.filter(x=>x.id!==r.id);for(const d in S.plan)S.plan[d]=(S.plan[d]||[]).filter(id=>id!==r.id);save();cl();R();toast('Deleted');};});}

function showPicker(day){modal('Add to '+day,S.recipes.length?S.recipes.map(r=>`<div class="lnk" data-rid="${r.id}" style="cursor:pointer"><span style="font-weight:500">${h(r.name)}</span><span style="color:var(--muted);font-size:12px;flex-shrink:0">${r.ingredients.length} ing.</span></div>`).join(''):'<p style="color:var(--muted)">No recipes yet.</p>',(mc,cl)=>{$$('.lnk',mc).forEach(el=>{el.onclick=()=>{if(!S.plan[day])S.plan[day]=[];S.plan[day].push(el.dataset.rid);save();cl();R();toast(`Added to ${day}`);};});});}

function showDayPicker(target,rid){const old=document.querySelector('.ddm');if(old)old.remove();const wrap=target.closest('.ddw');if(!wrap)return;const dd=document.createElement('div');dd.className='ddm';DAYS.forEach(d=>{const b=document.createElement('button');b.textContent=d;b.onclick=e=>{e.stopPropagation();if(!S.plan[d])S.plan[d]=[];S.plan[d].push(rid);save();dd.remove();R();toast(`Added to ${d}`);};dd.appendChild(b);});wrap.appendChild(dd);setTimeout(()=>{const fn=e=>{if(!dd.contains(e.target)&&e.target!==target){dd.remove();document.removeEventListener('click',fn);}};document.addEventListener('click',fn);},10);}

// ═══ WOOLWORTHS FLOW ═══
async function startWW(){
  const uc=S.list.filter(i=>!i.checked);if(!uc.length)return;
  const ov=document.createElement('div');ov.className='wov';
  ov.innerHTML=`<div class="wfl"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><div><div style="font-size:12px;font-weight:700;color:var(--ww);text-transform:uppercase;letter-spacing:.08em">Woolworths</div><div style="font-size:13px;color:var(--muted)">Finding products...</div></div><button class="xb" id="wx">✕</button></div><div style="text-align:center;padding:40px"><div class="spin spd" style="width:32px;height:32px"></div><p style="margin-top:16px;color:var(--muted)">Searching for ${uc.length} items...</p></div></div>`;
  document.body.appendChild(ov);$('#wx',ov).onclick=()=>ov.remove();

  try{
    const ings=uc.map(i=>({name:i.name,searchTerm:toSearch(i.name),amount:i.amount,unit:i.unit}));
    const resp=await fetch('/api/woolworths/batch-search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ingredients:ings})});
    if(!resp.ok)throw new Error('Server error '+resp.status);
    const data=await resp.json();

    if(data.blocked || !data.results?.length){
      // ── IMMEDIATE FALLBACK: show search links ──
      showFallbackLinks(ov, uc, data.message || 'Woolworths product search is currently unavailable.');
      return;
    }

    const hasAnyMatch = data.results.some(r=>r.matches.length>0);
    if(!hasAnyMatch){
      showFallbackLinks(ov, uc, 'No products found. Woolworths may be blocking automated searches. Use the links below to search manually.');
      return;
    }

    showProductSel(ov, data.results, uc);
  }catch(err){
    console.error(err);
    showFallbackLinks(ov, uc, 'Could not connect to Woolworths: '+err.message);
  }
}

function showFallbackLinks(ov, unchecked, message){
  let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><div><div style="font-size:12px;font-weight:700;color:var(--ww);text-transform:uppercase;letter-spacing:.08em">Woolworths</div></div><button class="xb" id="wx2">✕</button></div>`;
  html+=`<div class="warn" style="margin-bottom:16px">${h(message)}</div>`;
  html+=`<p style="font-size:14px;font-weight:600;margin-bottom:12px">Search each item on Woolworths:</p>`;
  unchecked.forEach(item=>{
    const q=encodeURIComponent(toSearch(item.name));
    html+=`<a class="lnk" href="https://www.woolworths.com.au/shop/search/products?searchTerm=${q}" target="_blank" rel="noopener"><span>${h(item.name)}</span>${item.amount?`<span style="font-size:12px;color:var(--muted);flex-shrink:0">${h(item.amount)}${item.unit?' '+h(item.unit):''}</span>`:''}<span style="color:var(--ww);flex-shrink:0">↗</span></a>`;
  });
  html+=`<button class="btn bs" style="width:100%;margin-top:16px" id="clsf">Close</button>`;
  $('.wfl',ov).innerHTML=html;
  $('#wx2',ov).onclick=()=>ov.remove();
  $('#clsf',ov).onclick=()=>ov.remove();
}

function showProductSel(ov, results, unchecked){
  const sel=results.map(r=>r.matches.length>0?{...r.matches[0],quantity:1}:null);

  function render(){
    const total=sel.reduce((s,p)=>s+(p?.price||0),0);
    const matched=sel.filter(Boolean).length;
    const loggedIn=S.wwAuth?.loggedIn;
    let o=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><div><div style="font-size:12px;font-weight:700;color:var(--ww);text-transform:uppercase;letter-spacing:.08em">Review Products</div><div style="font-size:13px;color:var(--muted)">${matched}/${results.length} matched</div></div><button class="xb" id="wx3">✕</button></div>`;
    o+=`<div class="wsu"><div style="display:flex;justify-content:space-between;padding:4px 0;font-size:14px"><span>Matched</span><span>${matched}/${results.length}</span></div><div style="display:flex;justify-content:space-between;padding:8px 0 0;margin-top:8px;border-top:2px solid var(--border);font-weight:700;font-size:16px"><span>Est. total</span><span>$${total.toFixed(2)}</span></div></div>`;

    results.forEach((r,idx)=>{
      o+=`<div style="font-size:13px;font-weight:600;margin:16px 0 8px;display:flex;justify-content:space-between"><span>${h(unchecked[idx]?.name||r.ingredient)}</span><span style="font-size:12px;color:var(--muted)">${h(unchecked[idx]?.amount||'')}${unchecked[idx]?.unit?' '+h(unchecked[idx].unit):''}</span></div>`;
      if(!r.matches.length){o+=`<div style="font-size:13px;color:var(--muted);padding:8px;background:var(--tag);border-radius:8px">No match — <a href="https://www.woolworths.com.au/shop/search/products?searchTerm=${encodeURIComponent(r.searchTerm)}" target="_blank" style="color:var(--ww)">search manually ↗</a></div>`;}
      else r.matches.forEach((p,pi)=>{
        const is=sel[idx]?.stockcode===p.stockcode;
        o+=`<div class="pc ${is?'sel':''}" data-si="${idx}" data-pi="${pi}"><img class="pi" src="${p.image||''}" alt="" onerror="this.style.display='none'"><div style="flex:1;min-width:0"><div class="pn">${h(p.name)}</div><div style="font-size:12px;color:var(--muted)">${h(p.packageSize)} ${p.cupString?'· '+h(p.cupString):''}</div>${p.isOnSpecial?'<div style="font-size:11px;color:var(--accent);font-weight:600">SPECIAL</div>':''}</div><div style="text-align:right;flex-shrink:0"><div class="pp">$${p.price?.toFixed(2)||'?'}</div>${p.wasPrice&&p.wasPrice>p.price?`<div style="font-size:11px;color:var(--muted);text-decoration:line-through">$${p.wasPrice.toFixed(2)}</div>`:''}</div></div>`;
      });
    });

    if(loggedIn){
      o+=`<button class="bw" id="cb" ${!matched?'disabled':''} style="margin-top:16px">🛒 Add ${matched} to cart</button><p style="font-size:12px;color:var(--muted);text-align:center;margin-top:8px">Adding to Woolworths cart (${h(S.wwAuth.email)})</p>`;
    }else{
      o+=`<div style="background:var(--card);border:2px solid var(--ww);border-radius:var(--r);padding:20px;margin-top:16px"><h3 style="font-family:var(--fd);font-size:18px;font-weight:600;color:var(--ww);margin-bottom:12px">Log in to Woolworths</h3><p style="font-size:13px;color:var(--muted);margin-bottom:12px">Log in to add items directly to your cart. We don't store your password.</p><div class="fg"><label class="fl">Email</label><input class="fi" id="we" type="email"></div><div class="fg"><label class="fl">Password</label><input class="fi" id="wp" type="password"></div><div id="wle" style="font-size:13px;color:#c53030;margin-bottom:8px;display:none"></div><button class="btn bp" style="width:100%;background:var(--ww)" id="wlb">Log in & Add to Cart</button></div>`;
      o+=`<div style="text-align:center;margin:12px 0"><span style="font-size:13px;color:var(--muted)">— or —</span></div>`;
      o+=`<button class="btn bo" style="width:100%" id="flb" ${!matched?'disabled':''}>Open product pages instead</button><p style="font-size:12px;color:var(--muted);text-align:center;margin-top:8px">Opens each on woolworths.com.au</p>`;
    }

    $('.wfl',ov).innerHTML=o;
    $('#wx3',ov).onclick=()=>ov.remove();
    $$('.pc',ov).forEach(c=>{c.onclick=()=>{sel[+c.dataset.si]={...results[+c.dataset.si].matches[+c.dataset.pi],quantity:1};render();};});

    // Cart button
    if($('#cb',ov)){$('#cb',ov).onclick=async()=>{
      const items=sel.filter(Boolean);if(!items.length)return;
      const btn=$('#cb',ov);btn.disabled=true;btn.innerHTML='<span class="spin"></span> Adding...';
      try{
        const r=await fetch('/api/woolworths/add-to-cart',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({items:items.map(p=>({stockcode:p.stockcode,quantity:p.quantity||1}))})});
        const d=await r.json();
        if(d.requiresLogin){S.wwAuth={loggedIn:false};toast('Session expired');render();return;}
        if(d.success){unchecked.forEach(it=>{const idx=S.list.findIndex(i=>i.name===it.name&&!i.checked);if(idx!==-1)S.list[idx].checked=true;});save();ov.remove();R();toast(`${d.addedCount} items added to cart!`);}
        else{btn.disabled=false;btn.textContent='🛒 Retry';}
      }catch(e){btn.disabled=false;btn.textContent='🛒 Retry';}
    };}

    // Login button
    if($('#wlb',ov)){$('#wlb',ov).onclick=async()=>{
      const em=$('#we',ov).value.trim(),pw=$('#wp',ov).value;if(!em||!pw)return;
      const btn=$('#wlb',ov),err=$('#wle',ov);btn.disabled=true;btn.innerHTML='<span class="spin"></span> Logging in...';err.style.display='none';
      try{const r=await fetch('/api/woolworths/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:em,password:pw})});const d=await r.json();
        if(d.success){S.wwAuth={loggedIn:true,email:d.email};toast('Logged in!');render();}
        else{err.textContent=d.error||'Login failed';err.style.display='block';btn.disabled=false;btn.textContent='Log in & Add to Cart';}
      }catch(e){err.textContent='Network error';err.style.display='block';btn.disabled=false;btn.textContent='Log in & Add to Cart';}
    };}

    // Fallback links button
    if($('#flb',ov)){$('#flb',ov).onclick=()=>{
      const items=sel.filter(Boolean);
      let lh=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><div><div style="font-size:12px;font-weight:700;color:var(--ww);text-transform:uppercase;letter-spacing:.08em">Product Links</div></div><button class="xb" id="wx4">✕</button></div><p style="font-size:13px;color:var(--muted);margin-bottom:16px">Tap each to open on woolworths.com.au:</p>`;
      items.forEach(p=>{lh+=`<a class="lnk" href="${p.productUrl||'https://www.woolworths.com.au/shop/productdetails/'+p.stockcode}" target="_blank"><span>${h(p.name)}</span><span style="font-weight:600;color:var(--ww);flex-shrink:0">$${p.price?.toFixed(2)||'?'}</span><span style="color:var(--ww);flex-shrink:0">↗</span></a>`;});
      lh+=`<button class="btn bs" style="width:100%;margin-top:16px" id="bk">← Back</button>`;
      $('.wfl',ov).innerHTML=lh;$('#wx4',ov).onclick=()=>ov.remove();$('#bk',ov).onclick=()=>render();
    };}
  }
  render();
}

R();
</script>
</body>
</html>
